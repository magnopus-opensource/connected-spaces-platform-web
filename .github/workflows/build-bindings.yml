name: Build WASM Bindings

on:
  pull_request:
  workflow_dispatch:
  workflow_call:
  push:
    branches:
      [main] # This is really just to seed the cache on main so PR's can reuse the same cache entries.
      # We could add a concurrency group if the redundancy bothers us for this, but I'm not fussed.
jobs:
  emscripten-build:
    runs-on: windows-latest

    strategy:
      fail-fast: false
      matrix:
        config: [release, debug]

    steps:
      - uses: actions/checkout@v7

      # MSVC is the build-context compiler used by profiles/build/windows.
      # Needed if Conan has to compile any tool_requires from source.
      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      # Setup EMSDK with cache so we don't have to re-download it constantly
      - name: Setup emsdk
        uses: emscripten-core/setup-emsdk@v15
        with:
          version: 5.0.2
          actions-cache-folder: "emsdk-cache"

      # emcc's --emit-tsd shells out to `tsc`. emsdk 5.0.2 invokes it with
      # `--outFile`, which errors under TypeScript 6.x. Pin to the latest 5.x
      # globally so emcc finds a compatible compiler on PATH. Drop this when
      # emsdk bumps past the fix for emscripten-core/emscripten#26534.
      - name: Install TypeScript (for emcc --emit-tsd)
        shell: bash
        run: npm install -g typescript@5.9.3

      # Builds CSP as a static emscripten archive and installs to CSP/install.
      # Requires emsdk to already be on PATH (above).
      # Might be nice to cache this as well.
      - name: Build CSP (emsdk)
        uses: ./.github/actions/build-csp-emsdk
        with:
          build_type: ${{ matrix.config == 'debug' && 'Debug' || 'Release' }}

      - name: Install Conan
        shell: pwsh
        run: pip install "conan==2.27.0"

      - name: Detect Conan build profile
        shell: pwsh
        run: conan profile detect --force

      - name: Conan install
        shell: bash
        env:
          # CMake 4 dropped support for cmake_minimum_required(VERSION <3.5), which
          # some older transitive Conan recipes (e.g. asyncplusplus/1.2) still
          # declare.
          # If cmake 4 is on the runner, this is neccesary.
          CMAKE_POLICY_VERSION_MINIMUM: "3.5"
        run: |
          set -eux
          conan install . \
            --profile:host=profiles/host/emscripten-${{ matrix.config }} \
            --build=missing

      - name: Configure
        shell: bash
        env:
          # Tell Cmake where CSP is
          CMAKE_PREFIX_PATH: ${{ github.workspace }}/CSP/install
        run: cmake --preset ${{ matrix.config }}

      - name: Build
        shell: bash
        run: cmake --build --preset ${{ matrix.config }}

      # Install prefix is set via CMAKE_INSTALL_PREFIX in CMakePresets.json.
      # The tests are hardcoded to find the package at <repo>/CSP-WASM-Bindings.
      - name: Install
        shell: bash
        run: cmake --build --preset ${{ matrix.config }} --target install

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install Test dependencies
        shell: bash
        working-directory: ./tests
        run: npm ci

      - name: Type Check Tests
        shell: bash
        working-directory: ./tests
        run: npm run typecheck

      - name: Lint Tests
        shell: bash
        working-directory: ./tests
        run: npm run lint

      - name: Install Playwright browsers
        shell: bash
        working-directory: ./tests
        run: npx playwright install chromium webkit

      - name: Test (Chromium)
        shell: bash
        working-directory: ./tests
        run: npm run test:chromium

      - name: Test (WebKit)
        shell: bash
        working-directory: ./tests
        run: npm run test:webkit

      - name: Package install dir
        shell: pwsh
        run: |
          Compress-Archive -Path CSP-WASM-Bindings\* -DestinationPath CSP-WASM-Bindings-${{ matrix.config }}.zip

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: CSP-WASM-Bindings-${{ matrix.config }}
          path: CSP-WASM-Bindings-${{ matrix.config }}.zip
          if-no-files-found: error
